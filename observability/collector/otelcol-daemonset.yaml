apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: otel-daemonset
  namespace: monitoring
spec:
  mode: daemonset
  image: otel/opentelemetry-collector-contrib:0.97.0
  serviceAccount: otel-collector
  tolerations:
    - operator: Exists
  resources:
    limits:
      cpu: 200m
      memory: 400Mi
    requests:
      cpu: 50m
      memory: 100Mi
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Scrape app Prometheus metrics endpoint (port 9464)
      prometheus:
        config:
          scrape_configs:
            - job_name: y_eet-app-metrics
              scrape_interval: 15s
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names: [auth, wallet, betting, game, fraud, settlement, default]
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  target_label: __address__
                  regex: (.+)
                  replacement: $${__meta_kubernetes_pod_ip}:$$1
                - source_labels: [__meta_kubernetes_pod_label_app]
                  target_label: app
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod

      # Kubernetes node/pod runtime metrics via kubeletstats
      kubeletstats:
        collection_interval: 30s
        auth_type: serviceAccount
        endpoint: "${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        metric_groups:
          - node
          - pod
          - container

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 350
        spike_limit_mib: 100

      batch:
        send_batch_size: 1024
        timeout: 5s
        send_batch_max_size: 2048

      # Enrich all telemetry with Kubernetes metadata
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
          labels:
            - tag_name: app.label.component
              key: component
              from: pod
          annotations:
            - tag_name: app.annotation.version
              key: app.version
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      # Drop health/readiness/metrics spans to reduce noise
      filter/drop_noisy_spans:
        error_mode: ignore
        traces:
          span:
            - 'attributes["http.target"] == "/health/live"'
            - 'attributes["http.target"] == "/health/ready"'
            - 'attributes["http.target"] == "/health/startup"'
            - 'attributes["http.target"] == "/metrics"'
            - 'attributes["http.url"] =~ ".*/health/live"'
            - 'attributes["http.url"] =~ ".*/health/ready"'
            - 'attributes["http.url"] =~ ".*/metrics"'

      # Redact sensitive attributes before export
      attributes/redact:
        actions:
          - key: http.request.header.authorization
            action: delete
          - key: http.request.header.cookie
            action: delete
          - key: db.statement
            action: update
            value: "[REDACTED]"

      resource/add_cluster:
        attributes:
          - key: k8s.cluster.name
            value: "${env:K8S_CLUSTER_NAME}"
            action: upsert
          - key: platform.region
            value: "${env:AWS_REGION}"
            action: upsert

    exporters:
      # Forward traces to gateway collector (tail-based sampling lives there)
      otlp/gateway:
        endpoint: otel-gateway.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

      # Forward metrics to Prometheus remote write
      prometheusremotewrite:
        endpoint: http://prometheus-operated.monitoring.svc.cluster.local:9090/api/v1/write
        tls:
          insecure: true
        resource_to_telemetry_conversion:
          enabled: true

      # Forward logs to Loki
      loki:
        endpoint: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push
        default_labels_enabled:
          exporter: false
          job: true
          level: true
        labels:
          resource:
            k8s.namespace.name: "namespace"
            k8s.pod.name: "pod"
            service.name: "service_name"
            deployment.environment: "environment"
          attributes:
            level: "level"

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource/add_cluster, filter/drop_noisy_spans, attributes/redact, batch]
          exporters: [otlp/gateway]

        metrics:
          receivers: [otlp, prometheus, kubeletstats]
          processors: [memory_limiter, k8sattributes, resource/add_cluster, batch]
          exporters: [prometheusremotewrite]

        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource/add_cluster, batch]
          exporters: [loki]

      telemetry:
        logs:
          level: warn
        metrics:
          address: 0.0.0.0:8888
