modules:
  http_health:
    prober: http
    timeout: 3s
    http:
      method: GET
      valid_status_codes: [200]
      fail_if_body_not_matches_regexp:
        - '"status"\s*:\s*"(ok|ready)"'

  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: [200, 201, 202, 204]

  tcp_connect:
    prober: tcp
    timeout: 5s
