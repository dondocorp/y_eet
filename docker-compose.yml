services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: dev
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
      - "${PROMETHEUS_PORT:-9464}:${PROMETHEUS_PORT:-9464}"
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      K8S_CLUSTER_NAME: local
      K8S_NAMESPACE: local
      K8S_POD_NAME: local
      K8S_NODE_NAME: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  # ── Observability Stack ────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9411:9411"   # Zipkin (Istio)
      - "8888:8888"   # Collector self-metrics
    volumes:
      - ./observability/collector/otelcol-local.yaml:/etc/otelcol/config.yaml
    depends_on:
      - tempo
      - loki
      - prometheus

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus-local.yaml:/etc/prometheus/prometheus.yaml
      - ./observability/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager/alertmanager-local.yaml:/etc/alertmanager/alertmanager.yaml

  loki:
    image: grafana/loki:3.0.0
    user: "0"
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./observability/loki/loki-local.yaml:/etc/loki/config.yaml
      - loki_data:/var/loki

  tempo:
    image: grafana/tempo:2.4.1
    ports:
      - "3200:3200"
      - "14268:14268"
    command: -config.file=/etc/tempo/config.yaml
    volumes:
      - ./observability/tempo/tempo-local.yaml:/etc/tempo/config.yaml
      - tempo_data:/var/tempo

  grafana:
    image: grafana/grafana-oss:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceToMetrics
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.24.0
    ports:
      - "9115:9115"
    volumes:
      - ./observability/synthetic/blackbox-local.yaml:/etc/blackbox_exporter/config.yml

  # ── Social Sentiment Subsystem ────────────────────────────────────────────
  social-sentiment:
    build:
      context: ./social-sentiment
      target: base
    container_name: social-sentiment
    ports:
      - "9465:9465"     # Prometheus metrics
    env_file:
      - ./social-sentiment/.env.example
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      ALERTMANAGER_WEBHOOK_URL: http://alertmanager:9093/api/v2/alerts
      DATA_DIR: /app/data
      MODEL_CACHE_DIR: /app/model_cache
      SCRAPER_HEADLESS: "true"
    volumes:
      - social_sentiment_data:/app/data
      - social_sentiment_models:/app/model_cache
      - ./social-sentiment:/app     # live reload in dev
    depends_on:
      - otel-collector
      - alertmanager
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9465/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  social-sentiment-dashboard:
    build:
      context: ./social-sentiment
      target: streamlit
    container_name: social-sentiment-dashboard
    ports:
      - "8501:8501"
    env_file:
      - ./social-sentiment/.env.example
    environment:
      DATA_DIR: /app/data
    volumes:
      - social_sentiment_data:/app/data
      - ./social-sentiment:/app
    depends_on:
      - social-sentiment
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
  social_sentiment_data:
  social_sentiment_models:
