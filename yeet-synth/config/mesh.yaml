# Mesh validation profile
# Full Istio policy verification: retries, timeouts, circuit breaker, mTLS, trace propagation.
# Run post-deploy or after any Istio policy change.
#
# Usage:
#   python main.py mesh --config config/mesh.yaml --validate-all

base_url: "${SYNTH_BASE_URL:-http://api.y_eet.internal}"
environment: "staging"

token_pool_size: 10
seed_admin_user: true

profile:
  name: mesh
  concurrency: 10
  duration_seconds: 120
  rps_target: 20.0
  mesh_validation: true
  scenario_weights:
    anonymous: 0.15
    authenticated: 0.35
    active_bettor: 0.30
    wallet_heavy: 0.15
    admin: 0.05

thresholds:
  max_error_rate: 0.05
  p99_latency_ms: 3000.0
  min_trace_propagation_rate: 0.90
  retry_amplification_threshold: 2.0

mesh:
  validate_retries: true
  validate_timeouts: true
  validate_circuit_breaker: true
  validate_canary: false
  validate_fault_injection: false   # enable only when VirtualService fault config is active
  validate_trace_propagation: true
  validate_mtls: true
  circuit_breaker_flood_rps: 100.0
  circuit_breaker_flood_duration: 10
