name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Lint + type-check
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

  # ─────────────────────────────────────────────────────────────────────────────
  # Instrumentation contract validation
  # Every service file must import from telemetry/metrics or telemetry/tracer
  # ─────────────────────────────────────────────────────────────────────────────
  instrumentation-check:
    name: Instrumentation Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check service telemetry imports
        run: |
          MISSING=0
          for file in src/services/*.ts; do
            if ! grep -q "from '../telemetry/metrics'" "$file" && \
               ! grep -q "from '../telemetry/tracer'" "$file"; then
              echo "::warning file=$file::Service has no telemetry imports"
              MISSING=1
            fi
          done
          [ "$MISSING" -eq 0 ] && echo "All services have telemetry imports." || exit 1

      - name: Check OTEL resource attribute standards
        run: |
          grep -q "SEMRESATTRS_SERVICE_NAME" src/telemetry/tracer.ts \
            || (echo "::error file=src/telemetry/tracer.ts::Missing service.name resource attribute" && exit 1)
          grep -q "SEMRESATTRS_DEPLOYMENT_ENVIRONMENT" src/telemetry/tracer.ts \
            || (echo "::error file=src/telemetry/tracer.ts::Missing deployment.environment resource attribute" && exit 1)
          echo "Resource attribute standards OK."

      - name: Check trace_id in error responses
        run: |
          grep -q "trace_id" src/app.ts \
            || (echo "::error file=src/app.ts::Error responses must include trace_id field" && exit 1)
          echo "trace_id in error responses OK."

  # ─────────────────────────────────────────────────────────────────────────────
  # Observability config validation
  # ─────────────────────────────────────────────────────────────────────────────
  observability-validate:
    name: Observability Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate OTEL Collector configs
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/observability/collector:/cfg \
            otel/opentelemetry-collector-contrib:0.97.0 \
            validate --config=/cfg/otelcol-local.yaml
          echo "OTEL Collector local config valid."

      - name: Validate Prometheus rules
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v ${{ github.workspace }}/observability/prometheus:/etc/prometheus \
            prom/prometheus:v2.51.0 \
            check rules \
              /etc/prometheus/rules/latency-errors.yaml \
              /etc/prometheus/rules/slo-burn-rate.yaml \
              /etc/prometheus/rules/queue-infra.yaml

      - name: Validate Alertmanager config
        run: |
          docker run --rm \
            --entrypoint amtool \
            -v ${{ github.workspace }}/observability/alertmanager:/etc/alertmanager \
            prom/alertmanager:v0.27.0 \
            check-config /etc/alertmanager/alertmanager-local.yaml

      - name: Validate Grafana dashboard JSON
        run: |
          FAIL=0
          find observability/grafana/dashboards -name "*.json" | while read -r f; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>&1 \
              || { echo "::error file=$f::Invalid JSON in dashboard"; FAIL=1; }
          done
          [ "$FAIL" -eq 0 ] && echo "All dashboard JSONs valid." || exit 1

      - name: Check dashboard required fields
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const glob = require('child_process')
            .execSync('find observability/grafana/dashboards -name "*.json"')
            .toString().trim().split('\n').filter(Boolean);

          const REQUIRED = ['uid', 'title', 'tags'];
          let fail = false;
          for (const f of glob) {
            const d = JSON.parse(fs.readFileSync(f, 'utf8'));
            for (const field of REQUIRED) {
              if (!d[field]) {
                console.log(`::warning file=${f}::Dashboard missing required field: ${field}`);
              }
            }
          }
          if (fail) process.exit(1);
          console.log('Dashboard field check complete.');
          EOF

  # ─────────────────────────────────────────────────────────────────────────────
  # Unit tests + coverage
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage --coverageReporters=text --coverageReporters=lcov --coverageReporters=json-summary
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          JWT_SECRET: test-secret-not-real-min-32-chars-here
          LOG_LEVEL: silent

      - name: Coverage report comment
        uses: ArtiomTr/jest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          skip-step: all
          coverage-file: coverage/coverage-summary.json
          base-coverage-file: coverage/coverage-summary.json
          annotations: all
          threshold: 65

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 30

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true
