name: Tag Version

on:
  pull_request:
    branches: [master]
    types: [closed]

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Determine next version
        id: version
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          # Get latest tag (default to v0.0 if none)
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0"
          fi

          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)

          if echo "$TITLE" | grep -qi '^major:'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
          elif echo "$TITLE" | grep -qi '^minor:'; then
            MINOR=$((MINOR + 1))
          else
            echo "PR title does not start with 'major:' or 'minor:' — skipping tag."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEXT="v${MAJOR}.${MINOR}"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Previous: $LATEST → Next: $NEXT"

      - name: Create and push tag
        if: steps.version.outputs.skip == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" -m "Release $TAG"
          git push origin "$TAG"
