# Brand relevance keyword rules for "Yeet Casino / Yeet.com"
# ============================================================

brand_queries:
  - id: y_eet_casino
    display_name: "Yeet Casino"
    primary_keywords:
      - "y_eet casino"
      - "y_eetcasino"
      - "y_eet.com casino"
      - "y_eet gaming"
      - "casino y_eet"
    secondary_keywords:
      # Brand-adjacent terms that raise confidence when co-occurring
      - "y_eet"
      - "y_eet slots"
      - "y_eet bonus"
      - "y_eet deposit"
      - "y_eet withdrawal"
      - "y_eet promo"
      - "y_eet vip"
      - "y_eet support"
      - "y_eet account"
      - "y_eet bet"
      - "y_eet.com"
    exclusion_keywords:
      # Hard exclude: junk, slang usage, unrelated content
      - "y_eet baby"
      - "y_eet challenge"
      - "y_eet meme"
      - "y_eet the"         # usually meme/"y_eet the algorithm"
      - "y_eet mode"
      - "y_eet fortnite"
      - "y_eet minecraft"
      - "y_eet roblox"
      - "y_eet it"
      - "y_eet bro"
      - "y_eet bih"
      - "y_eeted into"
      - "y_eeted off"
      - "can y_eet"
    # Soft exclusion — reduces relevance_score but doesn't hard-exclude
    soft_exclusion_keywords:
      - "football y_eet"
      - "y_eet workout"
      - "y_eet throw"
    # Required context: at least ONE must appear for secondary-keyword-only matches
    context_required_for_secondary:
      - "casino"
      - "gambling"
      - "slots"
      - "roulette"
      - "blackjack"
      - "poker"
      - "live dealer"
      - "spin"
      - "jackpot"
      - "wager"
      - "bet"
      - "deposit"
      - "withdrawal"
      - "withdraw"
      - "payout"
      - "bonus"
      - "promo"
      - "free spins"
      - "wagering"
      - "winnings"
      - "gg"             # common in gambling communities
      - "ggbet"
      - "crypto casino"
      - "btc casino"
      - "online casino"

